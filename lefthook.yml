# Format and lint
pre-commit:
  commands:
    generate-types:
      run: npm run generate-types
    typecheck:
      run: npm run typecheck
    biome:
      glob: "*.{js,ts,jsx,tsx,json,jsonc}"
      run: npx @biomejs/biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

# Validate commit messages  
commit-msg:
  commands:
    "lint commit message":
      run: npm run commitlint -- --edit {1}